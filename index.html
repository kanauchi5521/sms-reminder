<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMSリマインダー">
<title>SMSリマインダー</title>
<style>
  :root {
    --paper: #F4F5F7;
    --surface: #FFFFFF;
    --ink: #1C2333;
    --ink-soft: #6B7280;
    --indigo: #2B4C7E;
    --indigo-deep: #1B3A63;
    --indigo-wash: rgba(43,76,126,0.08);
    --line: #E4E6EC;
    --stamp: #C1443C;
    --stamp-wash: rgba(193,68,60,0.10);
    --whatsapp: #3E8E5B;
    --whatsapp-wash: rgba(62,142,91,0.10);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --shadow: 0 2px 14px rgba(28,35,51,0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button, input, textarea, select { font-family: inherit; }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: calc(84px + env(safe-area-inset-bottom));
    position: relative;
  }

  #app-header {
    padding: 22px 18px 10px;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 5;
  }
  .header-content { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  #app-header h1 { font-size: 21px; margin: 0 0 2px; font-weight: 800; letter-spacing: -0.02em; }
  .header-subtitle { margin: 0; font-size: 12.5px; color: var(--ink-soft); }
  .header-info-btn {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--ink-soft); cursor: pointer;
  }

  #main-content { padding: 4px 16px 8px; }
  .tab-section { display: none; }
  .tab-section.active { display: block; animation: fadein 0.22s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }

  .card { background: var(--surface); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }

  .step-label { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .step-num {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.03em;
    background: var(--indigo); color: #fff; padding: 3px 7px; border-radius: 5px;
  }
  .step-label span.step-text { font-size: 14px; font-weight: 700; color: var(--ink); }

  .section-title { font-size: 21px; font-weight: 800; margin: 6px 0 16px; letter-spacing: -0.01em; }
  .tab-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .tab-header-row .section-title { margin: 0; }

  .segmented { display: flex; background: var(--paper); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 14px; gap: 4px; }
  .segment {
    flex: 1; border: none; background: transparent; padding: 9px 6px; border-radius: 8px;
    font-size: 13px; font-weight: 700; color: var(--ink-soft); cursor: pointer;
  }
  .segment.active { background: var(--surface); color: var(--indigo); box-shadow: 0 1px 5px rgba(28,35,51,0.10); }
  .segment:disabled { opacity: 0.35; cursor: not-allowed; }

  .form-group { margin-bottom: 14px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-soft); margin-bottom: 6px; }
  input[type="text"], input[type="tel"], textarea, select.select-input {
    width: 100%; border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    padding: 11px 12px; font-size: 15px; background: var(--paper); color: var(--ink);
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--indigo); background: var(--surface); }
  textarea { resize: vertical; min-height: 92px; line-height: 1.6; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-top: 6px; cursor: pointer; color: var(--ink); }
  .checkbox-row input { width: 18px; height: 18px; accent-color: var(--indigo); }

  .placeholder-fields { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }

  .preview-box {
    background: var(--paper); border-left: 3px solid var(--indigo);
    border-radius: 4px 12px 12px 4px; padding: 14px 16px; font-size: 14px;
    line-height: 1.75; white-space: pre-wrap; min-height: 56px; color: var(--ink);
  }
  .char-count { font-size: 11.5px; color: var(--ink-soft); margin: 8px 0 0; text-align: right; }

  .preview-actions { display: flex; justify-content: flex-end; margin: 10px 0 4px; }

  .dispatch-divider { position: relative; height: 0; border-top: 2px dashed var(--line); margin: 20px -18px 18px; }
  .dispatch-divider::before, .dispatch-divider::after {
    content: ''; position: absolute; top: -7px; width: 14px; height: 14px; border-radius: 50%; background: var(--paper);
  }
  .dispatch-divider::before { left: -7px; }
  .dispatch-divider::after { right: -7px; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: var(--radius-sm); padding: 13px 16px;
    font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-block { width: 100%; margin-bottom: 10px; }
  .btn-small { padding: 8px 14px; font-size: 12.5px; width: auto; }
  .btn-primary { background: var(--indigo); color: #fff; }
  .btn-secondary { background: var(--paper); color: var(--ink); border: 1.5px solid var(--line); }
  .btn-danger { background: var(--stamp); color: #fff; }
  a.btn.disabled { opacity: 0.35; pointer-events: none; }

  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-soft); display: flex; align-items: center; justify-content: center; padding: 6px; }
  .icon-btn:active { color: var(--ink); }

  .list { display: flex; flex-direction: column; gap: 10px; }
  .list-item { background: var(--surface); border-radius: var(--radius-md); padding: 14px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); gap: 10px; }
  .list-item-main { flex: 1; min-width: 0; }
  .list-item-title { font-weight: 700; font-size: 15px; margin-bottom: 3px; word-break: break-word; }
  .list-item-sub { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 6px; }
  .list-item-snippet { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; }
  .list-item-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .badge-ok { background: var(--whatsapp-wash); color: var(--whatsapp); }
  .badge-muted { background: var(--stamp-wash); color: var(--stamp); }
  .channel-tag { font-size: 10.5px; font-weight: 700; color: var(--indigo); background: var(--indigo-wash); padding: 2px 7px; border-radius: 20px; margin-left: 6px; }

  .empty-state { text-align: center; color: var(--ink-soft); font-size: 14px; padding: 52px 20px; line-height: 1.8; }

  .hint { font-size: 12px; color: var(--ink-soft); margin: 6px 0; line-height: 1.55; }
  .error-text { font-size: 12.5px; color: var(--stamp); margin: 2px 0 10px; min-height: 0; }
  .error-text:empty { display: none; }

  #bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: var(--surface);
    display: flex; border-top: 1px solid var(--line);
    padding: 7px 6px calc(7px + env(safe-area-inset-bottom)); z-index: 10;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--ink-soft); font-size: 10px; font-weight: 700;
    padding: 6px 2px; cursor: pointer;
  }
  .nav-item.active { color: var(--indigo); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(28,35,51,0.42);
    display: flex; align-items: flex-end; justify-content: center; z-index: 20;
  }
  .modal-overlay.hidden { display: none; }
  .modal-sheet {
    background: var(--surface); width: 100%; max-width: 480px;
    border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height: 85vh; overflow-y: auto; animation: slideup 0.24s ease;
  }
  @keyframes slideup { from { transform: translateY(100%);} to { transform: translateY(0);} }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h3 { margin: 0; font-size: 17px; font-weight: 800; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; margin-bottom: 0; }
  .modal-sheet p { font-size: 14px; line-height: 1.7; color: var(--ink); }
</style>
</head>
<body>
  <div id="app">
    <header id="app-header"></header>
    <main id="main-content">
      <section id="tab-send" class="tab-section"></section>
      <section id="tab-contacts" class="tab-section"></section>
      <section id="tab-templates" class="tab-section"></section>
      <section id="tab-history" class="tab-section"></section>
    </main>
    <nav id="bottom-nav"></nav>
  </div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-sheet" id="modal-content"></div>
  </div>

<script>
/* ==================== 定数 ==================== */
var DEFAULT_TEMPLATES = [
  { id: 'tpl-1', title: '予約リマインド', body: '{name}様\n明日{date} {time}にご予約をいただいております。お忘れなくお越しください。ご都合が悪い場合はご連絡をお願いいたします。' },
  { id: 'tpl-2', title: 'お支払いリマインド', body: '{name}様\nお世話になっております。{date}までにお支払いをお願いいたします。ご確認のほどよろしくお願いいたします。' },
  { id: 'tpl-3', title: '一般リマインド', body: '{name}様\n{content}について、リマインドいたします。ご確認をお願いいたします。' }
];

/* ==================== 状態 ==================== */
var state = {
  contacts: [],
  templates: [],
  history: [],
  activeTab: 'send',
  recipientMode: 'manual',
  selectedContactId: null,
  manualName: '',
  manualPhone: '',
  manualSmsAvailable: true,
  messageMode: 'template',
  selectedTemplateId: null,
  customMessage: '',
  placeholderValues: {}
};

/* ==================== ストレージ ==================== */
function hasArtifactStorage() {
  return (typeof window.storage !== 'undefined') && (typeof window.storage.get === 'function');
}
var storageWarned = {};
async function loadData(key, fallback) {
  try {
    if (hasArtifactStorage()) {
      var res = await window.storage.get(key);
      if (res && res.value != null) return JSON.parse(res.value);
      return fallback;
    } else {
      var raw = localStorage.getItem('sms-reminder:' + key);
      if (raw != null) return JSON.parse(raw);
      return fallback;
    }
  } catch (e) {
    return fallback;
  }
}
async function saveData(key, value) {
  try {
    if (hasArtifactStorage()) {
      await window.storage.set(key, JSON.stringify(value));
    } else {
      localStorage.setItem('sms-reminder:' + key, JSON.stringify(value));
    }
    storageWarned[key] = false;
  } catch (e) {
    if (!storageWarned[key]) {
      storageWarned[key] = true;
      console.warn('保存が一時的に失敗しました(' + key + ')。送信機能自体には影響しません。', e);
    }
  }
}

/* ==================== ユーティリティ ==================== */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
function getTokens(text) {
  if (!text) return [];
  var matches = Array.from(text.matchAll(/\{([^}]+)\}/g));
  var seen = {};
  var tokens = [];
  matches.forEach(function(m) {
    var t = m[1].trim();
    if (t && !seen[t]) { seen[t] = true; tokens.push(t); }
  });
  return tokens;
}
function formatTimestamp(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return ''; }
}
function cleanPhoneForSms(phone) {
  return phone.replace(/[\s\-()]/g, '');
}

/* アイコン (インラインSVG) */
function iconSend() { return '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>'; }
function iconUser() { return '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'; }
function iconTemplate() { return '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>'; }
function iconClock() { return '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'; }
function iconEdit() { return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>'; }
function iconTrash() { return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'; }
function iconSms() { return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'; }
function iconChat() { return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'; }

/* ==================== ゲッター ==================== */
function getSelectedContact() {
  return state.contacts.find(function(c) { return c.id === state.selectedContactId; }) || null;
}
function getCurrentRecipientName() {
  if (state.recipientMode === 'saved') {
    var c = getSelectedContact();
    return c ? c.name : '';
  }
  return state.manualName;
}
function getCurrentRecipientPhone() {
  if (state.recipientMode === 'saved') {
    var c = getSelectedContact();
    return c ? c.phone : '';
  }
  return state.manualPhone;
}
function getCurrentSmsAvailable() {
  if (state.recipientMode === 'saved') {
    var c = getSelectedContact();
    return c ? c.smsAvailable !== false : true;
  }
  return state.manualSmsAvailable !== false;
}
function getSelectedMessageTemplate() {
  if (state.messageMode === 'template') {
    var t = state.templates.find(function(x) { return x.id === state.selectedTemplateId; });
    return t ? t.body : '';
  }
  return state.customMessage;
}
function buildPreview() {
  var raw = getSelectedMessageTemplate();
  if (!raw) return '';
  var name = getCurrentRecipientName();
  var text = raw.split('{name}').join(name || '（お名前）');
  if (state.messageMode === 'template') {
    var tokens = getTokens(raw).filter(function(t) { return t !== 'name'; });
    tokens.forEach(function(t) {
      var val = state.placeholderValues[t];
      text = text.split('{' + t + '}').join(val ? val : '（' + t + '）');
    });
  }
  return text;
}

/* ==================== シェル(ヘッダー・ナビ) ==================== */
function renderShell() {
  document.getElementById('app-header').innerHTML =
    '<div class="header-content">' +
      '<div><h1>SMSリマインダー</h1><p class="header-subtitle">かんたんメッセージ送信</p></div>' +
      '<button type="button" class="header-info-btn" data-action="show-info">?</button>' +
    '</div>';
  document.getElementById('bottom-nav').innerHTML =
    '<button type="button" class="nav-item" data-tab="send" data-action="switch-tab">' + iconSend() + '<span>送信</span></button>' +
    '<button type="button" class="nav-item" data-tab="contacts" data-action="switch-tab">' + iconUser() + '<span>連絡先</span></button>' +
    '<button type="button" class="nav-item" data-tab="templates" data-action="switch-tab">' + iconTemplate() + '<span>テンプレート</span></button>' +
    '<button type="button" class="nav-item" data-tab="history" data-action="switch-tab">' + iconClock() + '<span>履歴</span></button>';
}

function setActiveTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-section').forEach(function(el) { el.classList.remove('active'); });
  var target = document.getElementById('tab-' + tab);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  if (tab === 'send') renderSendTab();
  else if (tab === 'contacts') renderContactsTab();
  else if (tab === 'templates') renderTemplatesTab();
  else if (tab === 'history') renderHistoryTab();
}

/* ==================== 送信タブ ==================== */
function renderSendTab() {
  var el = document.getElementById('tab-send');
  var savedMode = state.recipientMode === 'saved';
  var hasContacts = state.contacts.length > 0;

  var recipientSection = '<div class="card">' +
    '<div class="step-label"><span class="step-num">01</span><span class="step-text">送信先</span></div>' +
    '<div class="segmented">' +
      '<button type="button" class="segment ' + (savedMode ? 'active' : '') + '" data-action="set-recipient-mode" data-mode="saved" ' + (!hasContacts ? 'disabled' : '') + '>保存済みの連絡先</button>' +
      '<button type="button" class="segment ' + (!savedMode ? 'active' : '') + '" data-action="set-recipient-mode" data-mode="manual">手動入力</button>' +
    '</div>';

  if (savedMode) {
    if (hasContacts) {
      recipientSection += '<select id="select-contact" class="select-input">' +
        '<option value="">選択してください</option>' +
        state.contacts.map(function(c) {
          return '<option value="' + c.id + '" ' + (c.id === state.selectedContactId ? 'selected' : '') + '>' +
            escapeHtml(c.name) + '（' + escapeHtml(c.phone) + '）' + (c.smsAvailable === false ? ' - SMS不可' : '') +
            '</option>';
        }).join('') +
        '</select>';
    } else {
      recipientSection += '<p class="hint">連絡先がまだありません。「連絡先」タブから追加するか、手動入力をお使いください。</p>';
    }
  } else {
    recipientSection +=
      '<div class="form-group"><label for="input-manual-name">お名前</label>' +
      '<input type="text" id="input-manual-name" placeholder="山田 太郎" value="' + escapeHtml(state.manualName) + '"></div>' +
      '<div class="form-group"><label for="input-manual-phone">電話番号</label>' +
      '<input type="tel" id="input-manual-phone" placeholder="090-1234-5678" value="' + escapeHtml(state.manualPhone) + '"></div>' +
      '<label class="checkbox-row"><input type="checkbox" id="input-manual-sms" ' + (state.manualSmsAvailable !== false ? 'checked' : '') + '><span>SMSを送信できる相手</span></label>';
  }
  recipientSection += '</div>';

  var tplMode = state.messageMode === 'template';
  var hasTemplates = state.templates.length > 0;
  var messageSection = '<div class="card">' +
    '<div class="step-label"><span class="step-num">02</span><span class="step-text">メッセージ</span></div>' +
    '<div class="segmented">' +
      '<button type="button" class="segment ' + (tplMode ? 'active' : '') + '" data-action="set-message-mode" data-mode="template" ' + (!hasTemplates ? 'disabled' : '') + '>テンプレート</button>' +
      '<button type="button" class="segment ' + (!tplMode ? 'active' : '') + '" data-action="set-message-mode" data-mode="custom">自由入力</button>' +
    '</div>';

  if (tplMode) {
    if (hasTemplates) {
      messageSection += '<select id="select-template" class="select-input">' +
        '<option value="">選択してください</option>' +
        state.templates.map(function(t) {
          return '<option value="' + t.id + '" ' + (t.id === state.selectedTemplateId ? 'selected' : '') + '>' + escapeHtml(t.title) + '</option>';
        }).join('') +
        '</select>';
    } else {
      messageSection += '<p class="hint">テンプレートがまだありません。「テンプレート」タブから追加してください。</p>';
    }
    var raw = getSelectedMessageTemplate();
    var tokens = getTokens(raw).filter(function(t) { return t !== 'name'; });
    if (tokens.length > 0) {
      messageSection += '<div class="placeholder-fields">';
      tokens.forEach(function(t) {
        var val = state.placeholderValues[t] || '';
        messageSection += '<div class="form-group"><label>' + escapeHtml(t) + '</label>' +
          '<input type="text" data-token-input="' + escapeHtml(t) + '" value="' + escapeHtml(val) + '" placeholder="' + escapeHtml(t) + 'を入力"></div>';
      });
      messageSection += '</div>';
    }
  } else {
    messageSection += '<textarea id="input-custom-message" rows="5" placeholder="メッセージを入力してください（{name}と書くとお名前が自動で入ります）">' + escapeHtml(state.customMessage) + '</textarea>';
  }
  messageSection += '</div>';

  var sendSection = '<div class="card">' +
    '<div class="step-label"><span class="step-num">03</span><span class="step-text">プレビューして送信</span></div>' +
    '<div class="preview-box" id="preview-text"></div>' +
    '<p class="char-count" id="char-count"></p>' +
    '<div class="dispatch-divider"></div>' +
    '<a href="#" id="send-sms" class="btn btn-primary btn-block" data-action="log-send" data-channel="SMS" target="_top">' + iconSms() + '<span>SMSで送信</span></a>' +
    '<p class="hint" id="sms-hint"></p>' +
    '<button type="button" class="btn btn-secondary btn-block" id="copy-preview-btn" data-action="copy-preview">' + iconChat() + '<span id="copy-preview-label">メッセージをコピー</span></button>' +
    '<p class="hint">+メッセージなど、ほかのアプリに貼り付けて送る場合はこちらでコピーしてください。</p>' +
  '</div>';

  el.innerHTML = recipientSection + messageSection + sendSection;
  refreshPreview();
}

function refreshPreview() {
  var previewEl = document.getElementById('preview-text');
  if (!previewEl) return;
  var text = buildPreview();
  if (text) {
    previewEl.textContent = text;
  } else {
    previewEl.innerHTML = '<span class="hint">メッセージがここに表示されます</span>';
  }
  var countEl = document.getElementById('char-count');
  if (countEl) {
    var len = text.length;
    if (len === 0) countEl.textContent = '';
    else if (len <= 70) countEl.textContent = len + ' 文字';
    else countEl.textContent = len + ' 文字（複数のSMSに分かれる場合があります）';
  }
  updateSendLinks(text);
}

function updateSendLinks(text) {
  var phone = (getCurrentRecipientPhone() || '').trim();
  var smsOk = getCurrentSmsAvailable();
  var encoded = encodeURIComponent(text || '');

  var smsLink = document.getElementById('send-sms');
  if (smsLink) {
    var smsReady = !!(phone && text);
    smsLink.href = smsReady ? ('sms:' + cleanPhoneForSms(phone) + '&body=' + encoded) : '#';
    smsLink.classList.toggle('disabled', !smsReady);
  }
  var smsHint = document.getElementById('sms-hint');
  if (smsHint) {
    smsHint.textContent = (phone && !smsOk) ? 'この相手はSMS不可に設定されています。下の「メッセージをコピー」から+メッセージ等でお送りください。' : '';
  }
}

async function handleCopyPreview() {
  var text = buildPreview();
  var btn = document.getElementById('copy-preview-btn');
  var label = document.getElementById('copy-preview-label');
  if (!text || !btn) return;
  var ok = false;
  try {
    await navigator.clipboard.writeText(text);
    ok = true;
  } catch (e) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ok = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (e2) { ok = false; }
  }
  var original = 'メッセージをコピー';
  if (label) {
    label.textContent = ok ? 'コピーしました ✓' : 'コピーできませんでした';
    setTimeout(function() { label.textContent = original; }, 1600);
  }
  if (ok) logSend('コピー');
}

function logSend(channel) {
  var text = buildPreview();
  var name = getCurrentRecipientName();
  var phone = getCurrentRecipientPhone();
  if (!text || !phone) return;
  var entry = {
    id: 'h' + Date.now() + Math.random().toString(36).slice(2, 6),
    name: name || '(名前未入力)',
    phone: phone,
    channel: channel,
    message: text,
    timestamp: new Date().toISOString()
  };
  state.history.unshift(entry);
  saveData('history', state.history);
}

/* ==================== 連絡先タブ ==================== */
function renderContactsTab() {
  var el = document.getElementById('tab-contacts');
  var html = '<div class="tab-header-row"><h2 class="section-title">連絡先</h2>' +
    '<button type="button" class="btn btn-primary btn-small" data-action="open-add-contact">＋ 追加</button></div>';

  if (state.contacts.length === 0) {
    html += '<div class="empty-state">連絡先がまだありません。<br>「＋ 追加」から登録してください。</div>';
  } else {
    html += '<div class="list">';
    state.contacts.forEach(function(c) {
      html += '<div class="list-item"><div class="list-item-main">' +
        '<div class="list-item-title">' + escapeHtml(c.name) + '</div>' +
        '<div class="list-item-sub">' + escapeHtml(c.phone) + '</div>' +
        '<span class="badge ' + (c.smsAvailable === false ? 'badge-muted' : 'badge-ok') + '">' + (c.smsAvailable === false ? 'SMS不可' : 'SMS可') + '</span>' +
        '</div><div class="list-item-actions">' +
        '<button type="button" class="icon-btn" data-action="edit-contact" data-id="' + c.id + '">' + iconEdit() + '</button>' +
        '<button type="button" class="icon-btn" data-action="delete-contact" data-id="' + c.id + '">' + iconTrash() + '</button>' +
        '</div></div>';
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function openContactModal(id) {
  var editing = !!id;
  var contact = editing ? state.contacts.find(function(c) { return c.id === id; }) : null;
  var html = '<div class="modal-header"><h3>' + (editing ? '連絡先を編集' : '連絡先を追加') + '</h3>' +
    '<button type="button" class="icon-btn" data-action="close-modal">✕</button></div>' +
    '<div class="form-group"><label for="form-contact-name">お名前</label>' +
    '<input type="text" id="form-contact-name" placeholder="山田 太郎" value="' + escapeHtml(contact ? contact.name : '') + '"></div>' +
    '<div class="form-group"><label for="form-contact-phone">電話番号</label>' +
    '<input type="tel" id="form-contact-phone" placeholder="090-1234-5678" value="' + escapeHtml(contact ? contact.phone : '') + '"></div>' +
    '<label class="checkbox-row"><input type="checkbox" id="form-contact-sms" ' + (!contact || contact.smsAvailable !== false ? 'checked' : '') + '><span>SMSを送信できる相手</span></label>' +
    '<p class="error-text" id="modal-error"></p>' +
    '<button type="button" class="btn btn-primary btn-block" data-action="save-contact" data-id="' + (id || '') + '" style="margin-top:14px;">保存</button>';
  openModal(html);
}

function saveContactFromForm(id) {
  var name = document.getElementById('form-contact-name').value.trim();
  var phone = document.getElementById('form-contact-phone').value.trim();
  var smsAvailable = document.getElementById('form-contact-sms').checked;
  if (!name || !phone) {
    showModalError('お名前と電話番号を入力してください。');
    return;
  }
  if (id) {
    var c = state.contacts.find(function(x) { return x.id === id; });
    if (c) { c.name = name; c.phone = phone; c.smsAvailable = smsAvailable; }
  } else {
    state.contacts.push({ id: 'c' + Date.now(), name: name, phone: phone, smsAvailable: smsAvailable });
  }
  saveData('contacts', state.contacts);
  closeModal();
  renderContactsTab();
}

function confirmDeleteContact(id) {
  var c = state.contacts.find(function(x) { return x.id === id; });
  confirmAction('「' + escapeHtml(c ? c.name : '') + '」を削除しますか？', function() {
    state.contacts = state.contacts.filter(function(x) { return x.id !== id; });
    if (state.selectedContactId === id) state.selectedContactId = null;
    saveData('contacts', state.contacts);
    renderContactsTab();
  });
}

/* ==================== テンプレートタブ ==================== */
function renderTemplatesTab() {
  var el = document.getElementById('tab-templates');
  var html = '<div class="tab-header-row"><h2 class="section-title">テンプレート</h2>' +
    '<button type="button" class="btn btn-primary btn-small" data-action="open-add-template">＋ 追加</button></div>';

  if (state.templates.length === 0) {
    html += '<div class="empty-state">テンプレートがまだありません。<br>「＋ 追加」から登録してください。</div>';
  } else {
    html += '<div class="list">';
    state.templates.forEach(function(t) {
      var snippet = t.body.length > 44 ? t.body.slice(0, 44) + '…' : t.body;
      html += '<div class="list-item"><div class="list-item-main">' +
        '<div class="list-item-title">' + escapeHtml(t.title) + '</div>' +
        '<div class="list-item-snippet">' + escapeHtml(snippet.replace(/\n/g, ' ')) + '</div>' +
        '</div><div class="list-item-actions">' +
        '<button type="button" class="icon-btn" data-action="edit-template" data-id="' + t.id + '">' + iconEdit() + '</button>' +
        '<button type="button" class="icon-btn" data-action="delete-template" data-id="' + t.id + '">' + iconTrash() + '</button>' +
        '</div></div>';
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function openTemplateModal(id) {
  var editing = !!id;
  var tpl = editing ? state.templates.find(function(t) { return t.id === id; }) : null;
  var html = '<div class="modal-header"><h3>' + (editing ? 'テンプレートを編集' : 'テンプレートを追加') + '</h3>' +
    '<button type="button" class="icon-btn" data-action="close-modal">✕</button></div>' +
    '<div class="form-group"><label for="form-template-title">タイトル</label>' +
    '<input type="text" id="form-template-title" placeholder="予約リマインド" value="' + escapeHtml(tpl ? tpl.title : '') + '"></div>' +
    '<div class="form-group"><label for="form-template-body">本文</label>' +
    '<textarea id="form-template-body" rows="6" placeholder="{name}様、明日{date} {time}のご予約をお忘れなく。">' + escapeHtml(tpl ? tpl.body : '') + '</textarea>' +
    '<p class="hint">「{name}」「{date}」のように { } で囲むと、送信時に入力できる項目になります。{name}には送信先の名前が自動で入ります。</p></div>' +
    '<p class="error-text" id="modal-error"></p>' +
    '<button type="button" class="btn btn-primary btn-block" data-action="save-template" data-id="' + (id || '') + '">保存</button>';
  openModal(html);
}

function saveTemplateFromForm(id) {
  var title = document.getElementById('form-template-title').value.trim();
  var body = document.getElementById('form-template-body').value.trim();
  if (!title || !body) {
    showModalError('タイトルと本文を入力してください。');
    return;
  }
  if (id) {
    var t = state.templates.find(function(x) { return x.id === id; });
    if (t) { t.title = title; t.body = body; }
  } else {
    state.templates.push({ id: 'tpl' + Date.now(), title: title, body: body });
  }
  saveData('templates', state.templates);
  closeModal();
  renderTemplatesTab();
}

function confirmDeleteTemplate(id) {
  var t = state.templates.find(function(x) { return x.id === id; });
  confirmAction('テンプレート「' + escapeHtml(t ? t.title : '') + '」を削除しますか？', function() {
    state.templates = state.templates.filter(function(x) { return x.id !== id; });
    if (state.selectedTemplateId === id) state.selectedTemplateId = null;
    saveData('templates', state.templates);
    renderTemplatesTab();
  });
}

/* ==================== 履歴タブ ==================== */
function renderHistoryTab() {
  var el = document.getElementById('tab-history');
  var html = '<div class="tab-header-row"><h2 class="section-title">送信履歴</h2>' +
    (state.history.length > 0 ? '<button type="button" class="btn btn-secondary btn-small" data-action="clear-history">クリア</button>' : '') +
    '</div>';

  if (state.history.length === 0) {
    html += '<div class="empty-state">送信履歴はまだありません。<br>送信ボタンを押すと、ここに記録されます。</div>';
  } else {
    html += '<div class="list">';
    state.history.forEach(function(h) {
      var snippet = h.message.length > 40 ? h.message.slice(0, 40) + '…' : h.message;
      html += '<div class="list-item"><div class="list-item-main">' +
        '<div class="list-item-title">' + escapeHtml(h.name) + '<span class="channel-tag">' + escapeHtml(h.channel) + '</span></div>' +
        '<div class="list-item-sub">' + escapeHtml(h.phone) + ' ・ ' + formatTimestamp(h.timestamp) + '</div>' +
        '<div class="list-item-snippet">' + escapeHtml(snippet.replace(/\n/g, ' ')) + '</div>' +
        '</div></div>';
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function confirmClearHistory() {
  confirmAction('送信履歴をすべて削除しますか？', function() {
    state.history = [];
    saveData('history', state.history);
    renderHistoryTab();
  });
}

/* ==================== モーダル共通 ==================== */
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML = '';
}
function showModalError(msg) {
  var err = document.getElementById('modal-error');
  if (err) err.textContent = msg;
}
function confirmAction(message, onConfirm) {
  var html = '<div class="modal-header"><h3>確認</h3></div>' +
    '<p>' + message + '</p>' +
    '<div class="modal-actions">' +
      '<button type="button" class="btn btn-secondary" data-action="close-modal">キャンセル</button>' +
      '<button type="button" class="btn btn-danger" id="confirm-action-btn">削除する</button>' +
    '</div>';
  openModal(html);
  document.getElementById('confirm-action-btn').addEventListener('click', function() {
    onConfirm();
    closeModal();
  });
}
function openInfoModal() {
  openModal(
    '<div class="modal-header"><h3>使い方</h3><button type="button" class="icon-btn" data-action="close-modal">✕</button></div>' +
    '<p>このアプリはメッセージ内容を準備し、SMSアプリを開く手伝いをします。</p>' +
    '<p>安全上の理由から、Webアプリが自動でメッセージを送信することはできません。開いたアプリの中で、最後の送信操作はご自身で行ってください。</p>' +
    '<p>SMSは端末や設定によって本文が自動入力されないことがあります。その場合は「メッセージをコピー」でコピーしてから、Messagesアプリに貼り付けてください。</p>' +
    '<p>+メッセージには外部から電話番号とメッセージ内容を指定して開く仕組みが公開されていないため、ワンタップ送信には対応していません。「メッセージをコピー」でコピーしたあと、+メッセージアプリを開いて貼り付けてご利用ください。</p>' +
    '<p class="hint">ホーム画面に追加すると、アプリのように使えます（共有ボタン→「ホーム画面に追加」）。</p>'
  );
}

/* ==================== イベント委譲 ==================== */
function handleClick(e) {
  var target = e.target.closest('[data-action]');
  if (!target) return;

  if (target.tagName === 'A' && target.classList.contains('disabled')) {
    e.preventDefault();
    return;
  }

  var action = target.dataset.action;
  switch (action) {
    case 'switch-tab': setActiveTab(target.dataset.tab); break;
    case 'set-recipient-mode': state.recipientMode = target.dataset.mode; renderSendTab(); break;
    case 'set-message-mode': state.messageMode = target.dataset.mode; renderSendTab(); break;
    case 'log-send': logSend(target.dataset.channel); break;
    case 'copy-preview': handleCopyPreview(); break;
    case 'open-add-contact': openContactModal(null); break;
    case 'edit-contact': openContactModal(target.dataset.id); break;
    case 'delete-contact': confirmDeleteContact(target.dataset.id); break;
    case 'open-add-template': openTemplateModal(null); break;
    case 'edit-template': openTemplateModal(target.dataset.id); break;
    case 'delete-template': confirmDeleteTemplate(target.dataset.id); break;
    case 'save-contact': saveContactFromForm(target.dataset.id || null); break;
    case 'save-template': saveTemplateFromForm(target.dataset.id || null); break;
    case 'close-modal': closeModal(); break;
    case 'clear-history': confirmClearHistory(); break;
    case 'show-info': openInfoModal(); break;
  }
}

function handleChange(e) {
  if (e.target.id === 'select-contact') {
    state.selectedContactId = e.target.value || null;
    renderSendTab();
  } else if (e.target.id === 'select-template') {
    state.selectedTemplateId = e.target.value || null;
    state.placeholderValues = {};
    renderSendTab();
  } else if (e.target.id === 'input-manual-sms') {
    state.manualSmsAvailable = e.target.checked;
    refreshPreview();
  }
}

function handleInput(e) {
  if (e.target.id === 'input-manual-name') {
    state.manualName = e.target.value;
    refreshPreview();
  } else if (e.target.id === 'input-manual-phone') {
    state.manualPhone = e.target.value;
    refreshPreview();
  } else if (e.target.id === 'input-custom-message') {
    state.customMessage = e.target.value;
    refreshPreview();
  } else if (e.target.dataset.tokenInput) {
    state.placeholderValues[e.target.dataset.tokenInput] = e.target.value;
    refreshPreview();
  }
}

document.body.addEventListener('click', handleClick);
document.body.addEventListener('change', handleChange);
document.body.addEventListener('input', handleInput);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ==================== 初期化 ==================== */
async function init() {
  renderShell();
  state.contacts = await loadData('contacts', []);
  var tpl = await loadData('templates', null);
  if (tpl === null) {
    tpl = DEFAULT_TEMPLATES.slice();
    await saveData('templates', tpl);
  }
  state.templates = tpl;
  state.history = await loadData('history', []);
  state.recipientMode = state.contacts.length > 0 ? 'saved' : 'manual';
  setActiveTab('send');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
